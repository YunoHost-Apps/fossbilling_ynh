packaging_format = 2

id = "fossbilling"
name = "FossBilling"
description.en = "Solution for efficient billing and client management for hosting providers"
description.fr = "Facturation et gestion client efficaces pour les hébergeurs"

version = "0.7.2~ynh3"

maintainers = ["CodeShakingSheep"]

[upstream]
license = "Apache-2.0"
website = "https://fossbilling.org"
demo = "https://fossbilling.org/demo"
admindoc = "https://fossbilling.org/docs"
userdoc = "https://fossbilling.org/docs"
code = "https://github.com/FOSSBilling/FOSSBilling"
cpe = "cpe:2.3:a:fossbilling:fossbilling"
fund = "https://opencollective.com/FOSSBilling"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/FOSSBilling/FOSSBilling/releases/download/0.7.2/FOSSBilling.zip"
    sha256 = "801a6ae42cb31a2f80fc98a908ba36e74b9758ef692c5ebfd300f5ca46189348"
    in_subdir = false

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset="FOSSBilling.zip"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]

    packages = "mariadb-server, php8.5-intl, php8.5-pdo, php8.5-mysql, php8.5-xml, php8.5-dom, php8.5-iconv, php8.5-curl, php8.5-mbstring, php8.5-imagick, php8.5-gd, php8.5-bz2, php8.5-simplexml"

    [resources.database]
    type = "mysql"
