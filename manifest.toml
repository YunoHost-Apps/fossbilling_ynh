packaging_format = 2

id = "fossbilling"
name = "FossBilling"
description.en = "Solution for efficient billing and client management"
description.fr = "Facturation et gestion client efficaces"

version = "0.7.2~ynh1"

maintainers = ["CodeShakingSheep"]

[upstream]
license = "Apache-2.0"
website = "https://fossbilling.org"
demo = "https://fossbilling.org/demo"
admindoc = "https://fossbilling.org/docs"
userdoc = "https://fossbilling.org/docs"
code = "https://github.com/FOSSBilling/FOSSBilling"
cpe = "cpe:2.3:a:fossbilling:fossbilling"
fund = "https://opencollective.com/FOSSBilling"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["fr", "en"]
    default = "fr"

    [install.admin]
    type = "user"

    [install.password]
    help.en = "Use the help field to add an information for the admin about this question."
    help.fr = "Utilisez le champ aide pour ajouter une information à l'intention de l'administrateur à propos de cette question."
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/FOSSBilling/FOSSBilling/releases/download/0.7.2/FOSSBilling.zip"
    sha256 = "801a6ae42cb31a2f80fc98a908ba36e74b9758ef692c5ebfd300f5ca46189348"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset="FOSSBilling.zip"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]

    packages = "mariadb-server, php8.4-intl, php8.4-openssl, php8.4-pdo, php8.4-mysql, php8.4-xml, php8.4-dom, php8.4-iconv, php8.4-curl"

    [resources.database]
    type = "mysql"
