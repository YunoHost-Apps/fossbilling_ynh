location / {
    
  # Path to source
  alias __INSTALL_DIR__/;
  set $root_path __INSTALL_DIR__/;

  index index.php;

  # Common parameter to increase upload size limit in conjunction with dedicated PHP-FPM file
  # client_max_body_size 50M;

  try_files $uri $uri/ @rewrite;
  
  location ~ [^/]\.php(/|$) {
    fastcgi_pass unix:/var/run/php/php__PHP_VERSION__-fpm-__APP__.sock;
    include fastcgi_params_no_auth;
  }

  # Block access to sensitive files
  location ~* .(ini|sh|inc|bak|twig|sql)$ {
    return 403;
  }
  # Block /vendor completely
  location ^~ /vendor/ {
    return 403;
  }

  # Block direct access to config.php
  location = /config.php {
    return 403;
  }
  # Block access to hidden files except .well-known
  location ~ /\.(?!well-known\/) {
    return 403;
  }
  # Disable PHP execution in /uploads
  location ~* /uploads/.*\.php$ {
    return 403;
  }
  # Deny access to /data, except /assets/gateways
  location ~* /data/(?!(assets/gateways/)) {
    return 403;
  }
  location ~* ^/(css|img|js|flv|swf|download)/(.+)$ {
    root $root_path;
    expires off;
  }
}

location @rewrite {
  rewrite ^/page/(?<page>.*)$ /index.php?_url=/custompages/$page;
  rewrite ^/(?<url>.*)$ /index.php?_url=/$url;
}
